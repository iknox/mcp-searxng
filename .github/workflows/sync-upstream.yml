name: Sync Upstream

on:
  schedule:
    - cron: '0 10 * * 1'  # 10:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Add upstream remote
        run: git remote add upstream https://github.com/ihor-sokoliuk/mcp-searxng.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Try merge
        id: merge
        if: steps.check.outputs.behind > 0
        run: |
          git checkout -b sync/upstream-$(date +%Y%m%d)
          if git merge upstream/main --no-commit; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Push branch and create PR (clean merge)
        if: steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git commit -m "chore: sync upstream $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Sync upstream $(date +%Y-%m-%d)" \
            --body "Automated sync from ihor-sokoliuk/mcp-searxng (${{ steps.check.outputs.behind }} commits)." \
            --label automated

      - name: Create issue for conflict
        if: steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Upstream sync conflict ($(date +%Y-%m-%d))" \
            --body "Automatic merge of upstream (${{ steps.check.outputs.behind }} commits) failed with conflicts. Resolve manually:

          \`\`\`
          git fetch upstream
          git checkout -b sync/upstream-$(date +%Y%m%d) main
          git merge upstream/main
          # resolve conflicts, then:
          git commit
          git push origin sync/upstream-$(date +%Y%m%d)
          gh pr create --base main --head sync/upstream-$(date +%Y%m%d) --title 'Sync upstream $(date +%Y-%m-%d)'
          \`\`\`" \
            --label automated
