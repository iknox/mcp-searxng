name: Feature request
description: Suggest a new feature or improvement
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation that motivates this request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed? If you have a specific API in mind, describe it here.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you have tried or alternative approaches you considered.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, prior art, related issues, etc.
