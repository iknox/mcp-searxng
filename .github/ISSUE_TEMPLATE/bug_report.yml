name: Bug report
description: Something is not working as expected
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue. The more context you share, the faster it can be addressed.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Run the server with ...
        2. Send this query / call this tool ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      options:
        - STDIO (default)
        - HTTP (MCP_HTTP_PORT set)
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How are you running mcp-searxng?
      options:
        - npx mcp-searxng
        - npm install -g + mcp-searxng
        - Docker (pre-built image)
        - Docker Compose
        - Built from source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mcp-searxng version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "e.g. Claude Desktop, Cursor, LM Studio, Goose, Pydantic AI"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11 (WSL2)"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: |
        Paste the relevant portion of your MCP client config or the docker-compose / docker run command you use.
        **Remove any passwords, tokens, or other secrets before posting.**
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Any error messages, stack traces, or server logs related to the issue.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context, workarounds tried, related issues, etc.
